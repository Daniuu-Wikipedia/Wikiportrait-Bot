{% extends 'base.html' %}

{% block head %}
    <title>Wikiportret - Gegevens Controleren</title>
{% endblock %}

{% block content_title %}
    <h1>Gegevens Controleren</h1>
{% endblock %}

{% block body %}
    <div class="card">
        <div class="mb-1">
            <p><strong>Commons Bestand:</strong> {{ bot.file }}</p>
            <p><strong>Wikipedia Artikel:</strong> {{ bot.name }}</p>
        </div>

        <form action="submit" method="POST">
            <div class="review-grid">
                <!-- First column: information for Wikidata -->
                <div class="form-section">
                    <h2 class="mb-1" style="font-size: 1.25rem;">Wikidata Informatie</h2>
                    
                    <div class="form-group">
                        <label for="i11">Naam v/d foto</label>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="check11" name="check11">
                            <input type="text" id="i11" name="i11" class="form-input" value="{{ bot.file }}" disabled>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="i12">Datum afbeelding (DD/MM/YYYY)</label>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="check12" name="checkdate">
                            <input type="date" id="i12" name="datevalue" class="form-input"
                                   {% if bot.date %}
                                   value="{{ bot.date.year }}-{{ '%02d'|format(bot.date.month) }}-{{ '%02d'|format(bot.date.day) }}"
                                   {% endif %} disabled>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="i14">Geboortedatum (DD/MM/YYYY)</label>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="check14" name="checkbirthdate">
                            <input type="date" id="i14" name="birthdatevalue" class="form-input"
                                   {% if bot.birth %}
                                   value="{{ bot.birth.year }}-{{ '%02d'|format(bot.birth.month) }}-{{ '%02d'|format(bot.birth.day) }}"
                                   {% endif %} disabled>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="i13">Overlijdensdatum (DD/MM/YYYY)</label>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="check13" name="checkdeathdate">
                            <input type="date" id="i13" name="deathdatevalue" class="form-input"
                                   {% if bot.death %}
                                   value="{{ bot.death.year }}-{{ '%02d'|format(bot.death.month) }}-{{ '%02d'|format(bot.death.day) }}"
                                   {% endif %} disabled>
                        </div>
                    </div>
                </div>

                <!-- Second column: all information on the image itself -->
                <div class="form-section">
                    <h2 class="mb-1" style="font-size: 1.25rem;">Afbeelding Details</h2>
                    
                    <div class="form-group">
                        <label for="i21">Categorienaam op Commons</label>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="check21" name="checkcat">
                            <input type="text" id="i21" name="catvalue" class="form-input" value="{{ bot.name }}" disabled>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="i22">Bijschrift op Wikipedia</label>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="check22" name="checkcaption">
                            <input type="text" id="i22" name="captionvalue" class="form-input" value="{{ bot.caption }}" disabled>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="license">Licentie</label>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="check23" name="checklicence">
                            <select id="license" name="licencevalue" class="form-input" disabled>
                                <option value="Commons" selected>Inladen vanaf Commons</option>
                                {% for option in license_options %}
                                    <option value="{{ option }}">{{ option }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="i24">Bewerkingssamenvatting</label>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="check24" name="checksummary">
                            <input type="text" id="i24" name="summaryvalue" class="form-input" value="{{ bot.sum }}" disabled>
                        </div>
                    </div>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 2rem 0;">

            <div class="mb-1">
                <div class="form-group" style="display: flex; align-items: center; gap: 1rem;">
                    <input type="checkbox" id="checkbox1" checked>
                    <label for="checkbox1" style="margin: 0;">Verzorg alle data op Commons</label>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 1rem;">
                    <input type="checkbox" id="checkbox2" checked>
                    <label for="checkbox2" style="margin: 0;">Koppel de afbeelding aan Wikidata</label>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 1rem;">
                    <input type="checkbox" id="checkbox3" checked>
                    <label for="checkbox3" style="margin: 0;">Plaats de afbeelding op Wikipedia (nlwiki)</label>
                </div>
            </div>

            <div class="mt-1 text-center">
                <button type="submit" class="btn">Plaats op Wiki</button>
            </div>

            <!-- Scripts -->
            <script src="{{ url_for('static', filename='js/checkbox_input_text.js') }}"></script>
            <script src="{{ url_for('static', filename='js/checkbox_selector.js') }}"></script>
            <script src="{{ url_for('static', filename='js/date_validator.js') }}"></script>
        </form>
    </div>
{% endblock %}
