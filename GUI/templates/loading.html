{% extends 'base.html' %}

{% block head %}
    <title>Wikiportret - Laden...</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/loading.css') }}">
{% endblock %}

{% block content_title %}
    <h1>Gegevens Ophalen</h1>
{% endblock %}

{% block body %}
    <div class="card text-center" style="max-width: 500px; margin: 0 auto;">
        <h2>Bezig met laden...</h2>
        <div class="progress-bar mt-1">
            <div class="progress"></div>
        </div>
        <p id="loading-message" class="text-secondary mt-1">Even geduld, de gegevens worden opgehaald.</p>
    </div>
    <script src="{{ url_for('static', filename='js/loading.js') }}"></script>
{% endblock %}
