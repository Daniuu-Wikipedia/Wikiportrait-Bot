{% extends 'base.html' %}

{% block head %}
    <title>Wikiportret - Foutmelding</title>
{% endblock %}

{% block content_title %}
    <h1>Foutmelding</h1>
{% endblock %}

{% block body %}
    <div class="card" style="border-left: 5px solid #d33;">
        <h2 style="color: #d33;" class="mb-1">Oeps! Er is iets misgegaan.</h2>
        <p>Helaas konden we uw verzoek niet verwerken.</p>
        <iframe src="https://klipy.com/gifs/patrick-star-tears/player" width="640" height="528" title="Patrick Star Crying" frameborder="0" allowfullscreen loading="lazy"></iframe>
        <div class="mt-1" style="background: #fff5f5; padding: 1rem; border-radius: 6px; font-family: monospace;">
            <strong>Bericht:</strong><br>
            {{message}}
        </div>

        <div class="mt-1 text-center">
            <a href="{{ url_for('input') }}" class="btn">Terug naar Dashboard</a>
        </div>
    </div>
{% endblock %}
